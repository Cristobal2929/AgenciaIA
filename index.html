<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA FÉNIX | Dominación con IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #030303; 
            background-image: radial-gradient(circle at 50% 0%, #002b2b 0%, #030303 70%);
            color: #fff; font-family: 'Roboto', sans-serif; margin: 0; text-align: center; 
        }
        .hero { padding: 60px 20px 20px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 3em; color: #00ffff; text-shadow: 0 0 20px #00ffff; margin: 0; }
        .section { padding: 20px; max-width: 800px; margin: auto; }
        .video-card { 
            background: rgba(10, 10, 10, 0.8); border: 1px solid #222; border-radius: 20px; 
            padding: 30px 20px; margin: 40px 0; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .step-badge { 
            background: #00ffff; color: #000; padding: 5px 15px; 
            font-weight: 900; border-radius: 5px; position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            font-family: 'Orbitron', sans-serif;
        }
        /* AJUSTE PARA VÍDEOS VERTICALES */
        .video-wrapper { 
            position: relative; padding-bottom: 177.77%; height: 0; border-radius: 15px; 
            overflow: hidden; border: 2px solid #333; background: #000; max-width: 350px; margin: 0 auto;
        }
        .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .cta-button { 
            background: #00ffff; color: #000; padding: 20px 40px; 
            font-size: 1.4em; font-family: 'Orbitron', sans-serif; font-weight: 900; text-decoration: none; 
            border-radius: 10px; display: inline-block; box-shadow: 0 0 20px #00ffff; transition: 0.3s;
        }
        .cta-button:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="hero">
        <h1>SISTEMA FÉNIX</h1>
        <p>Tu infraestructura de ventas con <span style="color:#00ffff">IA</span>.</p>
    </div>

    <div class="section">
        
        <div class="video-card">
            <div class="step-badge">FASE 01</div>
            <h2 style="font-family: 'Orbitron'; font-size: 1.2em;">EL DESPERTAR</h2>
            <div class="video-wrapper">
                <video controls playsinline preload="auto">
                    <source src="Primero.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <div class="video-card">
            <div class="step-badge">FASE 02</div>
            <h2 style="font-family: 'Orbitron'; font-size: 1.2em;">LA MAQUINARIA</h2>
            <div class="video-wrapper">
                <video controls playsinline preload="auto">
                    <source src="Segundo.mp4" type="video/mp4">

        <div class="video-card">
            <div class="step-badge">FASE 03</div>

            <div class="video-wrapper">
                <video controls playsinline preload="auto">
                    <source src="Tercero.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <a href="https://wa.me/34656691085" class="cta-button">ADQUIRIR SISTEMA FÉNIX</a>

    </div>

</body>
</html>
