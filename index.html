<!DOCTYPE html>
<html lang="es">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #030303; 
            background-image: radial-gradient(circle at 50% 0%, #002b2b 0%, #030303 70%);
            color: #fff; font-family: 'Roboto', sans-serif; margin: 0; text-align: center; 
        }
        .hero { padding: 80px 20px 40px; border-bottom: 2px solid rgba(0, 255, 255, 0.2); }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 3.5em; color: #00ffff; text-shadow: 0 0 25px rgba(0, 255, 255, 0.8); margin: 0; }
        .section { padding: 40px 20px 80px; max-width: 800px; margin: auto; }
        .video-card { 
            background: rgba(10, 10, 10, 0.8); border: 1px solid #222; border-radius: 20px; 
            padding: 30px 20px; margin: 50px 0; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .step-badge { 
            background: linear-gradient(90deg, #00ffff, #008b8b); color: #000; padding: 8px 20px; 
            font-weight: 900; border-radius: 30px; position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            font-family: 'Orbitron', sans-serif; box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4);
        }
        .video-wrapper { 
            position: relative; padding-bottom: 177.77%; height: 0; border-radius: 15px; 
            overflow: hidden; border: 2px solid #333; background: #000; max-width: 400px; margin: 0 auto;
        }
        .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .cta-button { 
            background: linear-gradient(45deg, #00ffff, #005555); color: #000; padding: 25px 50px; 
            font-size: 1.5em; font-family: 'Orbitron', sans-serif; font-weight: 900; text-decoration: none; 
            border-radius: 50px; display: inline-block; box-shadow: 0 0 30px rgba(0, 255, 255, 0.5); 
            transition: 0.3s; text-transform: uppercase;
        }
        .cta-button:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(0, 255, 255, 0.8); }
    </style>
</head>
<body>

    <div class="hero">
        <h1>SISTEMA FÉNIX</h1>
        <p>Tu infraestructura de ventas con <span style="color:#00ffff">Inteligencia Artificial</span>.</p>
    </div>

    <div class="section">
        
        <div class="video-card">
            <div class="step-badge">FASE 01</div>
            <h2 style="font-family: 'Orbitron';">EL DESPERTAR</h2>
            <div class="video-wrapper">
                <video controls playsinline preload="metadata">
                    <source src="Primero.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <div class="video-card">
            <div class="step-badge">FASE 02</div>
            <h2 style="font-family: 'Orbitron';">LA MAQUINARIA</h2>

            <div class="video-wrapper">
                <video controls playsinline preload="metadata">
                    <source src="Tercero.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <a href="https://wa.me/34656691085" class="cta-button">ADQUIRIR SISTEMA FÉNIX</a>

    </div>
